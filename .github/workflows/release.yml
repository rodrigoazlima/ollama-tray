name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller windows/ollama-tray.spec --distpath=dist --workpath=build
          pyinstaller windows/setup.spec --distpath=dist --workpath=build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/ollama-tray.exe
            dist/setup.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-tk upx-ucl

      - name: Install Python dependencies
        run: pip install -r requirements-linux.txt pyinstaller

      - name: Build Linux binary
        run: pyinstaller linux/ollama-tray.spec --distpath=dist --workpath=build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/ollama-tray

  build-wheel:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  release:
    needs: [build-windows, build-linux, build-wheel]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          TAG="${{ github.ref_name }}"
          cp artifacts/windows-exe/ollama-tray.exe "ollama-tray-${TAG}-windows-x64.exe"
          cp artifacts/windows-exe/setup.exe       "setup-${TAG}-windows-x64.exe"
          cp artifacts/linux-binary/ollama-tray    "ollama-tray-${TAG}-linux-x64"
          chmod +x "ollama-tray-${TAG}-linux-x64"
          cp artifacts/python-wheel/*.whl .

      - name: Publish release
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Determine prerelease flag
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-pre*|*-rc*|*-alpha*|*-beta*|*-release-candidate*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          # Delete any existing release for this tag (published or draft) to avoid conflicts
          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "ollama-tray $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "ollama-tray-${TAG}-windows-x64.exe" \
            "setup-${TAG}-windows-x64.exe" \
            "ollama-tray-${TAG}-linux-x64" \
            *.whl
