# ollama-tray — Black theme (OLED / pure black)
# Select via tray → Theme → Black, or set ui_theme = black in config.properties

ui_theme = black

# Backgrounds
# bg        #000000   pure black
# bg_dark   #0a0a0a   near-black (footer bar)
# surface   #141414   dark surface (header, input bg)
# surface1  #242424   lighter surface (hover state)
# overlay0  #3c3c3c   overlay (very dim text)

# Foregrounds
# dim       #858585   dim / secondary text
# subtext   #aaaaaa   field labels
# fg        #f8f8f8   primary text (near white)

# Accents
# blue      #5fa8f5   primary button, column header
# blue_act  #4fc9de   blue hover/active
# green     #4de87c   start button, good status
# green_act #3dccbd   green hover/active
# yellow    #ffd500   warning status
# red       #ff4444   error / bad status
