# ollama-tray — Dark theme (Catppuccin Mocha)
# Select via tray → Theme → Dark, or set ui_theme = dark in config.properties

ui_theme = dark

# Backgrounds
# bg        #1e1e2e   base
# bg_dark   #181825   mantle (footer bar)
# surface   #313244   surface0 (header, input bg)
# surface1  #45475a   surface1 (hover state)
# overlay0  #585b70   overlay0 (very dim text)

# Foregrounds
# dim       #6c7086   overlay1 (dim / secondary text)
# subtext   #a6adc8   subtext1 (field labels)
# fg        #cdd6f4   text     (primary text)

# Accents
# blue      #89b4fa   primary button, column header
# blue_act  #74c7ec   blue hover/active
# green     #a6e3a1   start button, good status
# green_act #94e2d5   green hover/active
# yellow    #f9e2af   warning status
# red       #f38ba8   error / bad status
