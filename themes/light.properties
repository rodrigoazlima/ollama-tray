# ollama-tray — Light theme (Catppuccin Latte)
# Select via tray → Theme → Light, or set ui_theme = light in config.properties

ui_theme = light

# Backgrounds
# bg        #eff1f5   base
# bg_dark   #e6e9ef   mantle (footer bar)
# surface   #ccd0da   surface0 (header, input bg)
# surface1  #bcc0cc   surface1 (hover state)
# overlay0  #9ca0b0   overlay0 (very dim text)

# Foregrounds
# dim       #7c7f93   overlay1 (dim / secondary text)
# subtext   #5c5f77   subtext1 (field labels)
# fg        #4c4f69   text     (primary text)

# Accents
# blue      #1e66f5   primary button, column header
# blue_act  #209fb5   blue hover/active
# green     #40a02b   start button, good status
# green_act #179299   green hover/active
# yellow    #df8e1d   warning status
# red       #d20f39   error / bad status
